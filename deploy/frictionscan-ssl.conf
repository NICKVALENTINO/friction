<VirtualHost 104.200.67.54:80>
    ServerName frictionscan.cc
    ServerAlias www.frictionscan.cc
    ServerAdmin webmaster@frictionscan.cc

    RewriteEngine On
    RewriteRule ^/.well-known/acme-challenge/ - [END]
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    DocumentRoot /home/fricscan/app/current/public
    CustomLog /var/log/httpd/domains/frictionscan.cc.log combined
    ErrorLog /var/log/httpd/domains/frictionscan.cc.error.log

    <Directory /home/fricscan/app/current/public>
        AllowOverride None
        Options -Indexes -ExecCGI -Includes +IncludesNOEXEC
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost 104.200.67.54:443>
    ServerName frictionscan.cc
    ServerAlias www.frictionscan.cc
    ServerAdmin webmaster@frictionscan.cc
    DocumentRoot /home/fricscan/app/current/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/frictionscan.cc/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/frictionscan.cc/privkey.pem

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    CustomLog /var/log/httpd/domains/frictionscan.cc.log combined
    ErrorLog /var/log/httpd/domains/frictionscan.cc.error.log

    <Directory /home/fricscan/app/current/public>
        AllowOverride None
        Options -Indexes -ExecCGI -Includes +IncludesNOEXEC
        Require all granted
        <FilesMatch "\.(php|inc|phtml)$">
            <If "-f %{REQUEST_FILENAME}">
                SetHandler "proxy:unix:/run/php-fpm/fricscan.sock|fcgi://localhost"
            </If>
        </FilesMatch>
        <FilesMatch "\.(php53|php54|php55|php56|php70|php71|php72|php73|php74|php80|php81|php82|php83|php84)$">
            Require all denied
        </FilesMatch>
    </Directory>
</VirtualHost>
