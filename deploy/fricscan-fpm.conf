[fricscan]
user = fricscan
group = fricscan
listen = /run/php-fpm/fricscan.sock
listen.owner = apache
listen.group = apache
listen.mode = 0660
pm = ondemand
pm.max_children = 4
pm.process_idle_timeout = 12s
pm.max_requests = 250
catch_workers_output = yes
php_admin_value[open_basedir] = /home/fricscan/app/current:/home/fricscan/private:/tmp
php_admin_value[session.save_path] = /home/fricscan/private/sessions
php_admin_value[upload_tmp_dir] = /home/fricscan/private/tmp
env[FRICTIONSCAN_PRIVATE_DIR] = /home/fricscan/private
env[FRICTIONSCAN_HASH_SALT] = replace-with-random-hash-salt
env[FRICTIONSCAN_NOTIFY_TO] = you@example.com
